<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duck Rescue AR по GPS</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #0f172a; }
    .arjs-loader {
      position: absolute; inset: 0; z-index: 9999;
      display: flex; justify-content: center; align-items: center; flex-direction: column;
      background: rgba(2, 6, 23, 0.95); color: #e2e8f0;
      font-family: "Segoe UI", system-ui, sans-serif; text-align: center; padding: 24px;
    }
    .arjs-loader p { margin: 8px 0; max-width: 360px; font-size: 14px; color: #94a3b8; }
    .arjs-loader a { color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="arjs-loader" id="loader">
    <p><strong>AR по GPS — Duck Rescue</strong></p>
    <p>Разрешите камеру и геолокацию. Объекты появляются в точках с заданными координатами.</p>
    <p><a href="start.html">← Старт</a>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
  >
    <a-camera gps-new-camera="gpsMinDistance: 0"></a-camera>

    <a-entity
      gps-new-entity-place="latitude: 55.7558; longitude: 37.6173"
      position="0 2 0"
      geometry="primitive: sphere; radius: 0.5"
      material="color: #7fffd4; emissive: #1dd3b0"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
    ></a-entity>
    <a-entity
      gps-new-entity-place="latitude: 55.7559; longitude: 37.6174"
      position="0 2 0"
      geometry="primitive: box; width: 0.6; height: 0.6; depth: 0.6"
      material="color: #7dd3fc"
    ></a-entity>
    <a-entity
      gps-new-entity-place="latitude: 55.7557; longitude: 37.6172"
      position="0 2.5 0"
      text="value: Duck Rescue GPS; align: center; width: 3; color: #8be9fd"
    ></a-entity>
  </a-scene>

  <script>
    window.addEventListener("arjs-source-ready", function () {
      var loader = document.getElementById("loader");
      if (loader) loader.style.display = "none";
    });
    setTimeout(function () {
      var loader = document.getElementById("loader");
      if (loader) loader.style.display = "none";
    }, 6000);
  </script>
</body>
</html>
